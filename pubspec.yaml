name: music_app
description: "A beautiful Flutter music player app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & DI
  provider: ^6.1.2
  get_it: ^8.0.3

  # Audio
  just_audio: ^0.9.43
  audio_service: ^0.18.17

  # Storage & File
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Metadata
  audio_metadata_reader: ^1.0.0

  # Streaming & Online Sources
  http: ^1.6.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.5.5
  youtube_explode_dart: ^3.1.0
  flutter_dotenv: ^6.0.1
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.7.0
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  assets:
    - .env
